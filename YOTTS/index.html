<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>YO → Pose Bridge (Smart Switch)</title>

<style>
body {
  margin: 0;
  min-height: 100vh;
  background-image: linear-gradient(to bottom,#f8ff9c 20%,#ffffff);
}

iframe {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  border: none;
}

#poseFrame {
  display: none;
}
</style>
</head>

<body>

<iframe id="yoFrame" src="YO/YO/index.html"></iframe>
<iframe id="poseFrame" src="TRY/TRY/index.html"></iframe>

<script>
const yoFrame = document.getElementById("yoFrame");
const poseFrame = document.getElementById("poseFrame");

let poseLoaded = false;
let audioUnlocked = false;

poseFrame.addEventListener("load", () => {
  poseLoaded = true;
});

function sendUnlockAudio() {
  try { yoFrame.contentWindow?.postMessage("UNLOCK_AUDIO", "*"); } catch (_) {}
  try { poseFrame.contentWindow?.postMessage("UNLOCK_AUDIO", "*"); } catch (_) {}
}

function sendStartPose() {
  try {
    poseFrame.contentWindow?.postMessage("START_POSE", "*");
  } catch (_) {}
}

function switchToPose(reason) {
  console.log("Switching to Pose:", reason);

  // 先請登入頁安靜下來，避免語音重疊
  try {
    yoFrame.contentWindow?.postMessage("STOP_VOICE", "*");
  } catch (_) {}

  yoFrame.style.display = "none";
  poseFrame.style.display = "block";

  // 只有在 Pose iframe 準備好之後，才送出 START_POSE 讓它啟動鏡頭與 MediaPipe
  if (poseLoaded) {
    if (audioUnlocked) sendUnlockAudio();
    sendStartPose();
  } else {
    const handler = () => {
      poseFrame.removeEventListener("load", handler);
      if (audioUnlocked) sendUnlockAudio();
      sendStartPose();
    };
    poseFrame.addEventListener("load", handler);
  }
}

// NEW: 平板端暴力解鎖全局音訊與 TTS，確保 iframe 內權限一併打開
window.addEventListener("pointerdown", () => {
  if (audioUnlocked) return;
  audioUnlocked = true;

  // 1. 強制恢復 AudioContext (iOS 核心)
  const AudioContext = window.AudioContext || window.webkitAudioContext;
  if (AudioContext) {
    try {
      const ctx = new AudioContext();
      if (ctx.state === "suspended") {
        ctx.resume();
      }
    } catch (_) {}
  }

  // 2. 預熱 TTS (防止後續 TTS 沒聲音)
  if (window.speechSynthesis) {
    try {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance("");
      window.speechSynthesis.speak(u);
    } catch (_) {}
  }

  // 3. 播放極短靜音，撥動一次喇叭
  try {
    const silent = new Audio("data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==");
    silent.play().catch(() => {});
  } catch (_) {}

  // 4. 通知內層 YO/TRY iframe 也一起解鎖
  sendUnlockAudio();
}, { once: true });

/* ===== 手動測試 ===== */
window.addEventListener("keydown", e => {
  if (e.key === "p") {
    switchToPose("manual key");
  }
});

/* ===== 正式流程：只接受 YO 傳來的 PREP_DONE 後才切換至 Pose ===== */
window.addEventListener("message", event => {
  if (event.source === yoFrame.contentWindow && event.data === "PREP_DONE") {
    switchToPose("PREP_DONE");
  }
});
</script>

</body>
</html>
